# Experiment B: ProtoCLR — ProtoHead + 跨域對比損失
# 將 SS 和 train_audio 同類別嵌入拉近，不同類別推遠
# 參考: arXiv:2409.08589 (Domain-Invariant Representation Learning of Bird Sounds)

exp_type: protocl

# Model (同 proto_head)
emb_dim: 1536
proj_dim: 512
num_classes: 234
n_blocks: 2
dropout: 0.10
temperature: 0.05

# Training
lr: 2e-4
weight_decay: 1e-3
n_epochs: 80
batch_size: 256
patience: 15
focal_gamma: 2.0

# ProtoCLR loss weight (主 focal BCE + 0.3 × ProtoCLR)
protocl_weight: 0.3
protocl_temperature: 0.07

# Val
val_per_missing_class: 3

# 熱啟動：從 proto_head 實驗的結果開始
init_ckpt: weights/perch_new/proto_head_r0.pt

# Paths
output_name: protocl_r0.pt
output_dir: weights/perch_new
log_dir: outputs/perch_new/logs
labeled_ss_npz: outputs/perch_labeled_ss.npz
unlabeled_ss_npz: outputs/perch_emb_all_ss.npz
train_audio_manifest: outputs/embeddings_cache_nohuman/manifest.csv
train_audio_emb_dir: outputs/embeddings_cache_nohuman/train
taxonomy_csv: birdclef-2026/taxonomy.csv

# 不需要 FixMatch
fixmatch_weight: 0.0
