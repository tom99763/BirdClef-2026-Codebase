experiment:
  name: "debug-run"
  seed: 42

data:
  train_audio_dir: "birdclef-2026/train_audio"
  train_soundscapes_dir: "birdclef-2026/train_soundscapes"
  train_csv: "birdclef-2026/train.csv"
  taxonomy_csv: "birdclef-2026/taxonomy.csv"
  soundscapes_labels_csv: "birdclef-2026/train_soundscapes_labels.csv"
  sample_submission_csv: "birdclef-2026/sample_submission.csv"
  min_rating: 0.0
  use_secondary_labels: true
  max_files: 200            # limit to speed up debug

audio:
  sample_rate: 32000
  clip_duration: 5
  n_clips_per_file: 1

model:
  perch_dir: "models/bird-vocalization-classifier-tensorflow2-perch_v2-v2"
  mode: "embedding_head"
  hidden_dim: 256
  dropout: 0.3

training:
  epochs: 3
  batch_size: 16
  optimizer: "adam"
  learning_rate: 1.0e-3
  weight_decay: 1.0e-4
  scheduler: "none"
  warmup_epochs: 0
  label_smoothing: 0.05
  mixup_alpha: 0.0
  use_soundscapes_in_train: false

augmentation:
  enabled: false
  noise_level: 0.005
  gain_range: [0.7, 1.3]

cache:
  enabled: false
  cache_dir: "outputs/embeddings_cache_debug"

wandb:
  enabled: false
  project: "birdclef-2026"
  entity: null
  tags: ["debug"]
  log_model: false

output:
  dir: "outputs/debug"
  checkpoint_dir: "checkpoints/debug"
