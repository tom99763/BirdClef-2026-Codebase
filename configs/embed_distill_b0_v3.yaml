run_name: embed-distill-b0-v3

# B0 + InfoNCE (contrastive) loss + SpecAugment
# InfoNCE forces discriminative representations:
#   batch negatives make the model learn to distinguish different sounds,
#   not just match magnitude — stronger gradient signal than cosine loss

data:
  manifest_path: outputs/embeddings_cache/manifest.csv
  train_audio_dir: birdclef-2026/train_audio
  soundscapes_dir: birdclef-2026/train_soundscapes
  mel_cache_dir: outputs/mel_cache

audio:
  sample_rate: 32000
  clip_seconds: 5

mel:
  n_fft: 2048
  hop_length: 512
  n_mels: 224
  fmin: 0.0
  fmax: 16000.0

model:
  backbone: tf_efficientnet_b0.ns_jft_in1k
  teacher_dim: 1536
  pretrained: true
  drop_rate: 0.1
  in_chans: 1

training:
  epochs: 30
  batch_size: 64      # larger batch = more negatives = better InfoNCE
  learning_rate: 0.001
  weight_decay: 0.0001
  warmup_epochs: 2
  early_stopping_patience: 5
  loss_fn: infonce    # NT-Xent, temperature=0.1

augmentation:
  enabled: true
  freq_mask_param: 30
  time_mask_param: 48
  n_freq_masks: 1
  n_time_masks: 1
  noise_std: 0.0
  mixup_alpha: 0.0
