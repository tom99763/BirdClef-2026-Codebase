data:
  audio_dir: birdclef-2026/train_audio
  competitor_ckpt: outputs/finetune-comp-v3/fold2_best.pt
  n_folds: 5
  perch_ss_csv: pseudo_labels/finetune_v3_ss_pseudo.csv
  soundscape_dir: birdclef-2026/train_soundscapes
  soundscape_labels_csv: birdclef-2026/train_soundscapes_labels.csv
  taxonomy_csv: birdclef-2026/taxonomy.csv
  train_csv: birdclef-2026/train.csv
experiment:
  name: finetune-comp-v4
  seed: 42
model:
  backbone: tf_efficientnet_b0.ns_jft_in1k
  clip_duration: 5
  drop_path_rate: 0.05
  dropout: 0.1
  fmax: 16000
  fmin: 0
  freq_mask: 24
  gem_p_init: 3.0
  hop_length: 512
  mel_scale: htk
  n_fft: 2048
  n_mels: 224
  norm: slaney
  power: 2.0
  time_mask: 32
  top_db: 80.0
output:
  dir: outputs/finetune-comp-v4
training:
  backbone_lr_mult: 0.1
  batch_size: 64
  early_stopping_patience: 6
  epochs: 25
  focal_gamma: 2.0
  learning_rate: 2.0e-05
  ss_oversample: 2
  ss_weight: 0.5
  use_llrd: true
  use_sumix_freq: true
  warmup_epochs: 2
  weight_decay: 0.0001
