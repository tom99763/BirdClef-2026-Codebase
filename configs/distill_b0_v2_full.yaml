experiment:
  name: distill-b0-v2-full
  seed: 42

# ── Perch-as-Teacher Knowledge Distillation v2 (Full Dataset) ────────────────
#
# Identical to distill-b0-v1 EXCEPT teacher_csv uses the FULL extraction:
#   outputs/perch_teacher_all_ss.csv (~256K segments from all 10658 soundscape files)
#
# This is the "throw in a bunch of wave files" approach:
#   All 10658 unlabeled Pantanal soundscapes → Perch teacher → SED student
#
# Requires: scripts/extract_perch_teacher_all_ss.py to have completed first.
#
# Expected: more teacher signal → better domain adaptation to Pantanal test domain

data:
  train_audio_dir: birdclef-2026/train_audio
  train_soundscapes_dir: birdclef-2026/train_soundscapes
  train_csv: birdclef-2026/train.csv
  taxonomy_csv: birdclef-2026/taxonomy.csv
  soundscapes_labels_csv: birdclef-2026/train_soundscapes_labels.csv
  sample_submission_csv: birdclef-2026/sample_submission.csv
  teacher_csv: outputs/perch_teacher_all_ss.csv   # ALL 10658 soundscape files
  min_rating: 0.0
  use_secondary_labels: true
  secondary_label_weight: 1.0
  max_files: null
  noise_dir: null

audio:
  sample_rate: 32000
  clip_duration: 5
  n_clips_per_file: 3

mel:
  n_fft: 2048
  hop_length: 512
  n_mels: 224
  fmin: 0.0
  fmax: 16000.0

model:
  backbone: tf_efficientnet_b0.ns_jft_in1k
  pretrained: true
  dropout: 0.1
  in_chans: 3
  use_gem: true
  gem_p_init: 3.0
  use_gpu_mel: true
  use_pcen: true
  trainable_pcen: true

training:
  epochs: 30
  batch_size: 32
  optimizer: adamw
  learning_rate: 0.0005
  weight_decay: 0.0001
  scheduler: cosine
  warmup_epochs: 3
  label_smoothing: 0.0
  mixup_alpha: 0.5
  loss: asl
  asl_gamma_neg: 4.0
  asl_gamma_pos: 0.0
  asl_clip: 0.05
  clip_loss_weight: 0.5
  frame_loss_weight: 0.5
  use_soundscapes_in_train: true
  soundscape_val_frac: 0.2
  soundscape_oversample: 5
  save_topk_checkpoints: 3
  use_llrd: true
  backbone_lr_mult: 0.1
  use_amp: true
  grad_clip_norm: 1.0
  distill_weight: 0.5
  distill_ss_oversample: 1
  early_stopping_patience: 5

augmentation:
  enabled: true
  noise_level: 0.005
  gain_range: [0.7, 1.3]
  time_masking: true
  time_mask_ratio: 0.15
  time_mask_n: 2
  freq_masking: true
  freq_mask_param: 30
  background_noise: false
  snr_db_range: [5.0, 30.0]
  circ_shift_prob: 0.5

wandb:
  enabled: true
  project: birdclef-2026
  entity: null
  tags: [distill, perch-teacher, b0-v2, full-10k-ss, pcen, asl, dual-loss, llrd, amp, round4]
  log_model: false

output:
  dir: outputs
  checkpoint_dir: checkpoints
