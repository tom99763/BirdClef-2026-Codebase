experiment:
  name: perch-probe-v3-addtrain-only
  seed: 42

# V3 baseline: add_train=True, NO proto/tip/gamma
# This is the PROVEN winner from v2 ablation:
#   v2-full oof_auc_mlp = 0.8041 (vs v2-tip oof_auc_mlp = 0.7515 without add_train)
# Proto/Tip/Gamma all HURT blended AUC — MLP with 85k train data is the key.
#
# Purpose: replace pca+logReg in ensemble notebook (must beat OOF ~0.77 of LogReg)

data:
  base_dir: birdclef-2026
  manifest_path: outputs/embeddings_cache_nohuman/manifest.csv
  pca_fit_splits: [train, soundscape]
  add_train_clips: true

model:
  pca_dim: 128
  hidden_dim: 512         # larger than v2 (256) — more capacity with 85k training data
  use_hidden: true
  dropout: 0.3
  pca_whiten: true
  use_proto: false
  use_tip: false
  use_gamma: false

training:
  epochs: 150
  batch_size: 256
  n_folds: 5
  learning_rate: 0.001
  weight_decay: 0.0001
  patience: 25
  asl_gamma_neg: 4.0
  asl_gamma_pos: 0.0
  asl_clip: 0.05

output:
  dir: outputs

wandb:
  enabled: true
  project: birdclef-2026
  tags: [perch-probe, v3, add-train-only, mlp, pca128, baseline]
