experiment:
  name: distill-competitor-b0-v2
  seed: 42

# ── Competitor KD v2 — with soundscape soft-label augmentation ────────────────
#
# Changes vs v1:
#   - Also trains on unlabeled soundscapes with competitor soft labels
#     (competitor run on soundscapes → SoftSoundscapeDataset, same as train_distill.py)
#   - kd_weight raised to 0.7 (more teacher influence since v1 showed it helps)
#   - drop_path_rate raised to 0.20 (more regularisation with larger data)
#   - Soundscape pseudo CSV = outputs/perch_teacher_aug_all_ss.csv (Perch labels)
#     replaced by competitor predictions on soundscapes
#
# Requires: outputs/competitor_pseudo/train_audio_probs.npz (from v1 gen step)
#           outputs/competitor_pseudo/soundscape_probs.npz  (gen_competitor_ss_pseudo.py)

data:
  train_csv:             birdclef-2026/train.csv
  soundscape_labels_csv: birdclef-2026/train_soundscapes_labels.csv
  taxonomy_csv:          birdclef-2026/taxonomy.csv
  audio_dir:             birdclef-2026/train_audio
  soundscape_dir:        birdclef-2026/train_soundscapes
  competitor_pseudo_npz: outputs/competitor_pseudo/train_audio_probs.npz
  competitor_ss_npz:     outputs/competitor_pseudo/soundscape_probs.npz
  n_folds:               5

model:
  backbone:       tf_efficientnet_b0.ns_jft_in1k
  clip_duration:  5
  n_mels:         224
  n_fft:          2048
  hop_length:     512
  fmin:           0
  fmax:           16000
  top_db:         80.0
  power:          2.0
  norm:           slaney
  mel_scale:      htk
  peak_norm:      false
  dropout:        0.1
  drop_path_rate: 0.20
  gem_p_init:     3.0
  freq_mask:      24
  time_mask:      32

training:
  early_stopping_patience: 5
  epochs:          30
  batch_size:      128
  learning_rate:   1.0e-3
  weight_decay:    1.0e-4
  focal_gamma:     2.0
  mixup_alpha:     0.15
  use_sumix_freq:  true
  kd_weight:       0.7
  ss_kd_weight:    0.5      # weight for soundscape KD branch
  ss_oversample:   2        # how many ss batches per train_audio batch

output:
  dir: outputs/distill-competitor-b0-v2
