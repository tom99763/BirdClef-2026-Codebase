experiment:
  name: sed-b0-v4
  seed: 42

data:
  train_audio_dir: birdclef-2026/train_audio
  train_soundscapes_dir: birdclef-2026/train_soundscapes
  train_csv: birdclef-2026/train.csv
  taxonomy_csv: birdclef-2026/taxonomy.csv
  soundscapes_labels_csv: birdclef-2026/train_soundscapes_labels.csv
  sample_submission_csv: birdclef-2026/sample_submission.csv
  min_rating: 0.0          # use all recordings (competitor uses all)
  use_secondary_labels: true
  max_files: null
  noise_dir: null

audio:
  sample_rate: 32000
  clip_duration: 5
  n_clips_per_file: 3      # more clips per file vs v3's 2

mel:
  n_fft: 2048
  hop_length: 512
  n_mels: 224
  fmin: 0.0
  fmax: 16000.0

model:
  backbone: tf_efficientnet_b0.ns_jft_in1k
  pretrained: true
  dropout: 0.1
  in_chans: 3
  use_gem: true
  gem_p_init: 3.0
  use_gpu_mel: true

training:
  epochs: 20
  batch_size: 32
  optimizer: adamw
  learning_rate: 0.0005    # competitor: 0.0005
  weight_decay: 0.0001
  scheduler: cosine
  warmup_epochs: 2
  label_smoothing: 0.0
  mixup_alpha: 0.5         # competitor: 0.5
  loss: bce                # plain BCE (no focal, no pos_weight)
  clip_loss_weight: 0.5    # competitor: clip_loss_weight=0.5
  frame_loss_weight: 0.5   # competitor: frame_loss_weight=0.5
  use_soundscapes_in_train: true
  soundscape_oversample: 5

augmentation:
  enabled: true
  noise_level: 0.005
  gain_range:
    - 0.7
    - 1.3
  time_masking: true
  time_mask_ratio: 0.1
  time_mask_n: 2
  background_noise: false
  snr_db_range:
    - 5.0
    - 30.0

wandb:
  enabled: true
  project: birdclef-2026
  entity: null
  tags:
    - SED
    - b0-v4
    - bce
    - dual-loss
    - soundscape-train
    - competitor-config
  log_model: false

output:
  dir: outputs
  checkpoint_dir: checkpoints
