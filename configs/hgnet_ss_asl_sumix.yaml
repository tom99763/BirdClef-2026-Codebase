experiment:
  name: hgnet-ss-asl-sumix
  seed: 42

# ── HGNet SS-ASL+SumixFreq: Best Loss + Freq Aug Combo ──────────────────────
# 拆解 combo：只測試 ASL + SumixFreq 的組合效果。
# 這兩個 trick 分別從 loss 與 augmentation 角度改善 long-tail 問題，
# 相輔相成的可能性最高。

data:
  train_csv:             birdclef-2026/train.csv
  soundscape_labels_csv: birdclef-2026/train_soundscapes_labels.csv
  taxonomy_csv:          birdclef-2026/taxonomy.csv
  audio_dir:             birdclef-2026/train_audio
  soundscape_dir:        birdclef-2026/train_soundscapes
  soundscape_gt_csv:     birdclef-2026/train_soundscapes_labels.csv
  n_folds:               5

model:
  backbone:     hgnetv2_b0.ssld_stage2_ft_in1k
  in_chans:     1
  n_mels:       256
  n_fft:        2048
  win_length:   626
  hop_length:   313
  fmin:         20
  top_db:       80.0
  power:        2.0
  lms_shape:    [256, 256]
  mixup_alpha:  1.0
  mixup_theta:  0.8

training:
  epochs:                   30
  batch_size:               64
  learning_rate:            5.0e-4
  weight_decay:             1.0e-4
  use_llrd:                 false
  warmup_epochs:            2
  early_stopping_patience:  7
  loss_type:                asl
  asl_gamma_pos:            0.0
  asl_gamma_neg:            4.0
  asl_margin:               0.05
  timewise_weight:          0.5
  ss_gt_weight:             0.3
  ss_gt_oversample:         2
  use_sumix_freq:           true
  sumix_alpha:              0.5
  use_specaug:              false
  use_cutmix:               false
  use_gain_norm:            false
  use_swa:                  false

output:
  dir: outputs/hgnet-ss-asl-sumix
