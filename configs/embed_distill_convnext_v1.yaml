run_name: embed-distill-convnext-v1

# ConvNeXt-Tiny (fb_in22k_ft_in1k), feat_dim=768, in_chans=1
# Modern architecture with different inductive bias vs EfficientNet
# ImageNet-22k pretrained → stronger general features
# + SpecAugment

data:
  manifest_path: outputs/embeddings_cache/manifest.csv
  train_audio_dir: birdclef-2026/train_audio
  soundscapes_dir: birdclef-2026/train_soundscapes
  mel_cache_dir: outputs/mel_cache

audio:
  sample_rate: 32000
  clip_seconds: 5

mel:
  n_fft: 2048
  hop_length: 512
  n_mels: 224
  fmin: 0.0
  fmax: 16000.0

model:
  backbone: convnext_tiny.fb_in22k_ft_in1k
  teacher_dim: 1536
  pretrained: true
  drop_rate: 0.1
  in_chans: 1

training:
  epochs: 30
  batch_size: 64
  learning_rate: 0.0005   # ConvNeXt prefers lower LR
  weight_decay: 0.05      # ConvNeXt standard higher wd
  warmup_epochs: 3
  early_stopping_patience: 5

augmentation:
  enabled: true
  freq_mask_param: 30
  time_mask_param: 48
