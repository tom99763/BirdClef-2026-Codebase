experiment:
  name: perch-probe-v3-laplacian
  seed: 42

# LaplacianShot transductive inference
# Jointly optimizes predictions over all soundscape clips using kNN graph
# Based on: Ziko et al., ICML 2020 "LaplacianShot"
# Expected: +7-10pp on iNat-like tasks (234 species, batch inference)

data:
  base_dir: birdclef-2026
  manifest_path: outputs/embeddings_cache_nohuman/manifest.csv
  pca_fit_splits: [train, soundscape]
  add_train_clips: true

model:
  pca_dim: 128
  hidden_dim: 512
  use_hidden: true
  dropout: 0.3
  pca_whiten: true
  abt_n_top: 0
  use_proto: false
  use_tip: false
  use_fecam: false
  use_laplacian: true       # LaplacianShot batch transductive inference
  laplacian_k: 7            # kNN graph degree
  laplacian_lam: 0.5        # Laplacian regularization strength
  use_gamma: false
  blend_mlp: 1.0            # MLP + LaplacianShot are blended inside the loop (0.5/0.5)

training:
  epochs: 150
  batch_size: 256
  n_folds: 5
  learning_rate: 0.001
  weight_decay: 0.0001
  patience: 25
  asl_gamma_neg: 4.0
  asl_gamma_pos: 0.0
  asl_clip: 0.05

output:
  dir: outputs

wandb:
  enabled: true
  project: birdclef-2026
  tags: [perch-probe, v3, laplacianshot, transductive, pca128, add-train]
