# BirdClef 2026 — SED B0 v3 (Reference-matched)
#
# Fixes vs sed-b0-v2 (LB=0.728):
#   1. n_mels: 224   (was 128)  — matches reference LB=0.862
#   2. hop_length: 512 (was 320)
#   3. n_fft: 2048   (was 1024)
#   4. fmin: 0       (was 20.0)
#   5. in_chans: 3   (was 1)   — RGB mel via 3-channel replication
#   6. dropout: 0.1  (was 0.2)
#   7. peak audio normalization in train_sed.py (audio /= |audio|.max())
#   8. use_soundscapes_in_train: false  (soundscape labels too sparse/noisy)
#   9. batch_size: 32 (3× larger input → 3× more memory)
#  10. PP in submission: quantile_mix(alpha=0.5) + slide_max (not threshold+slide_max)

experiment:
  name: "sed-b0-v3"
  seed: 42

data:
  train_audio_dir: "birdclef-2026/train_audio"
  train_soundscapes_dir: "birdclef-2026/train_soundscapes"
  train_csv: "birdclef-2026/train.csv"
  taxonomy_csv: "birdclef-2026/taxonomy.csv"
  soundscapes_labels_csv: "birdclef-2026/train_soundscapes_labels.csv"
  sample_submission_csv: "birdclef-2026/sample_submission.csv"
  min_rating: 3.0
  use_secondary_labels: true
  max_files: null
  noise_dir: null

audio:
  sample_rate: 32000
  clip_duration: 5
  n_clips_per_file: 2

mel:
  n_fft: 2048
  hop_length: 512             # 32kHz / 512 = 62.5 frames/sec → 5s clip ≈ 313 frames
  n_mels: 224
  fmin: 0.0
  fmax: 16000.0

model:
  backbone: "tf_efficientnet_b0.ns_jft_in1k"
  pretrained: true
  dropout: 0.1
  in_chans: 3                 # RGB mel (3-channel replication) — matches reference
  use_gem: true
  gem_p_init: 3.0
  use_gpu_mel: true

training:
  epochs: 30
  batch_size: 32              # reduced vs v2 (larger mels, 3-channel)
  optimizer: "adamw"
  learning_rate: 1.0e-4
  weight_decay: 1.0e-4
  scheduler: "cosine"
  warmup_epochs: 3
  label_smoothing: 0.05
  mixup_alpha: 0.3

  loss: "bce_pos_weight"
  focal_gamma: 2.0            # unused
  focal_alpha: -1             # unused

  use_soundscapes_in_train: false  # no soundscape training (noisy labels)
  soundscape_oversample: 0

  class_weight_mode: "none"

augmentation:
  enabled: true
  noise_level: 0.005
  gain_range: [0.7, 1.3]
  time_masking: true
  time_mask_ratio: 0.1
  time_mask_n: 2
  background_noise: false
  snr_db_range: [5.0, 30.0]

wandb:
  enabled: true
  project: "birdclef-2026"
  entity: null
  tags: ["SED", "b0-v3", "bce-pos-weight", "224-mels", "in_chans-3", "reference-matched"]
  log_model: false

output:
  dir: "outputs"
  checkpoint_dir: "checkpoints"
