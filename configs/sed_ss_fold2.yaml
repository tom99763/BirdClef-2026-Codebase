experiment:
  name: sed-ss-fold2
  seed: 42

# Soundscape-only SED training — Fold 2/4
# Train ONLY on labeled train_soundscapes (target domain, no focal recordings).
# Eliminates focal→soundscape domain gap entirely.
# Val = files 32–47 (alphabetical), Train = files 16–65 (1194 clips)
#
# Key design choices:
#   loss: ce (2024 1st place winner)
#   frame_loss: 0.0 (no synthetic frame labels)
#   secondary: false (soundscape labels are already multi-label via ';')
#   mixup_alpha: 0.5 (proven to help with small datasets)
#   soundscape_only: false (max_files=0, skip focal recordings)
#   soundscape_oversample: 20 (amplify small dataset)

data:
  train_audio_dir: birdclef-2026/train_audio
  train_soundscapes_dir: birdclef-2026/train_soundscapes
  train_csv: birdclef-2026/train.csv
  taxonomy_csv: birdclef-2026/taxonomy.csv
  soundscapes_labels_csv: birdclef-2026/train_soundscapes_labels.csv
  soundscape_val_files_txt: configs/ss_folds/ss_fold2_val.txt
  sample_submission_csv: birdclef-2026/sample_submission.csv
  min_rating: 0.0
  use_secondary_labels: false
  secondary_label_weight: 0.0
  max_files: null

audio:
  sample_rate: 32000
  clip_duration: 5
  n_clips_per_file: 3

mel:
  n_fft: 2048
  hop_length: 512
  n_mels: 224
  fmin: 0.0
  fmax: 16000.0

model:
  backbone: tf_efficientnet_b0.ns_jft_in1k
  pretrained: true
  dropout: 0.2
  in_chans: 3
  use_gem: true
  gem_p_init: 3.0
  use_gpu_mel: true

training:
  epochs: 50
  batch_size: 32
  optimizer: adamw
  learning_rate: 0.001
  weight_decay: 0.0001
  scheduler: cosine
  warmup_epochs: 5
  label_smoothing: 0.1
  mixup_alpha: 0.5
  loss: ce
  clip_loss_weight: 1.0
  frame_loss_weight: 0.0
  soundscape_only: false
  use_soundscapes_in_train: true
  soundscape_val_frac: 0.2
  soundscape_oversample: 20
  save_topk_checkpoints: 5
  early_stopping_patience: 15

augmentation:
  enabled: true
  noise_level: 0.005
  gain_range: [0.7, 1.3]
  time_masking: true
  time_mask_param: 30
  freq_masking: true
  freq_mask_param: 30

wandb:
  enabled: true
  project: birdclef-2026
  entity: null
  tags: [SED, ss-only, fold2, ce-loss, soundscape-domain, no-focal]
  log_model: false

output:
  dir: outputs
  checkpoint_dir: checkpoints
