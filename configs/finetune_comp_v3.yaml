experiment:
  name: finetune-comp-v3
  seed: 42

# ── Fine-tune Competitor SED v3 — Noisy Student Round 1 ─────────────────────
#
# Init     : best fold from v2 (not competitor — progressive fine-tuning)
# Strategy : Use SED predictions on soundscapes as updated pseudo labels
#            (sed_20s_r1.csv or round5_pseudo.csv — our own model's predictions)
#
# Rationale: v2 model has higher AUC than competitor → better pseudo labels
#            Use v2 predictions on soundscapes instead of original Perch labels
#
# competitor_ckpt: set to best v2 fold dynamically by auto_finetune.sh

data:
  train_csv:             birdclef-2026/train.csv
  soundscape_labels_csv: birdclef-2026/train_soundscapes_labels.csv
  taxonomy_csv:          birdclef-2026/taxonomy.csv
  audio_dir:             birdclef-2026/train_audio
  soundscape_dir:        birdclef-2026/train_soundscapes
  competitor_ckpt:       "PLACEHOLDER_UPDATED_BY_PIPELINE"
  perch_ss_csv:          pseudo_labels/round5_pseudo.csv   # will be updated by pipeline
  n_folds:               5

model:
  backbone:       tf_efficientnet_b0.ns_jft_in1k
  clip_duration:  5
  n_mels:         224
  n_fft:          2048
  hop_length:     512
  fmin:           0
  fmax:           16000
  top_db:         80.0
  power:          2.0
  norm:           slaney
  mel_scale:      htk
  dropout:        0.05
  drop_path_rate: 0.05
  gem_p_init:     3.0
  freq_mask:      24
  time_mask:      32

training:
  early_stopping_patience: 5
  epochs:           20
  batch_size:       64
  learning_rate:    1.0e-5      # even lower LR for round 2
  weight_decay:     1.0e-4
  focal_gamma:      2.0
  use_sumix_freq:   true
  ss_weight:        0.4         # slightly higher weight for updated pseudo
  ss_oversample:    2
  use_llrd:         true
  backbone_lr_mult: 0.1
  warmup_epochs:    1

output:
  dir: outputs/finetune-comp-v3
