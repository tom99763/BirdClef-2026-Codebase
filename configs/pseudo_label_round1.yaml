# Pseudo-label Round 1 Training Config (BirdCLEF 2025 1st place technique)
#
# After generating pseudo_labels/round1_pseudo.csv via:
#   python pseudo_label.py generate --config configs/birdclef25_improvements.yaml \
#       --checkpoint checkpoints/birdclef25-improvements-v1/best_head \
#       --output pseudo_labels/round1_pseudo.csv --power 2.0 --threshold 0.5
#
# Run this config for Round 1 pseudo-label training:
#   python train.py --config configs/pseudo_label_round1.yaml
#
# Then repeat pseudo_label.py generate with the new checkpoint for Round 2.

experiment:
  name: "pseudo-label-round1"
  seed: 42

data:
  train_audio_dir: "birdclef-2026/train_audio"
  train_soundscapes_dir: "birdclef-2026/train_soundscapes"
  # NOTE: train_csv still points to original data.
  # The pseudo-labeled soundscape segments are provided via
  # use_soundscapes_in_train: true (when that flag is wired up)
  # For now, use original data + soundscape pseudo-labels merged externally.
  train_csv: "birdclef-2026/train.csv"
  taxonomy_csv: "birdclef-2026/taxonomy.csv"
  soundscapes_labels_csv: "birdclef-2026/train_soundscapes_labels.csv"
  sample_submission_csv: "birdclef-2026/sample_submission.csv"
  min_rating: 3.0
  use_secondary_labels: true
  max_files: null
  noise_dir: null

audio:
  sample_rate: 32000
  clip_duration: 5
  n_clips_per_file: 3

model:
  perch_dir: "models/bird-vocalization-classifier-tensorflow2-perch_v2-v2"
  mode: "embedding_head"
  hidden_dim: 512
  dropout: 0.3

training:
  epochs: 30                      # Fewer epochs for pseudo-label rounds
  batch_size: 64
  optimizer: "adamw"
  learning_rate: 5.0e-4           # Lower LR for fine-tuning with pseudo-labels
  weight_decay: 1.0e-4
  scheduler: "cosine"
  warmup_epochs: 2
  label_smoothing: 0.05
  mixup_alpha: 0.3
  use_soundscapes_in_train: false
  loss: "focal"
  focal_gamma: 2.0
  focal_alpha: 0.25
  class_weight_mode: "sqrt"

augmentation:
  enabled: true
  noise_level: 0.005
  gain_range: [0.7, 1.3]
  time_masking: true
  time_mask_ratio: 0.1
  time_mask_n: 2
  background_noise: false
  snr_db_range: [5.0, 30.0]

cache:
  enabled: true
  cache_dir: "outputs/embeddings_cache"

wandb:
  enabled: true
  project: "birdclef-2026"
  entity: null
  tags: ["pseudo-label", "round1", "noisy-student"]
  log_model: false

output:
  dir: "outputs"
  checkpoint_dir: "checkpoints"
