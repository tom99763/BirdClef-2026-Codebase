data:
  audio_dir: birdclef-2026/train_audio
  init_ckpt: outputs/hgnet-v1/fold0_best.pt
  n_folds: 5
  perch_ss_csv: pseudo_labels/round5_pseudo.csv
  soundscape_dir: birdclef-2026/train_soundscapes
  soundscape_labels_csv: birdclef-2026/train_soundscapes_labels.csv
  taxonomy_csv: birdclef-2026/taxonomy.csv
  train_csv: birdclef-2026/train.csv
experiment:
  name: hgnet-v2
  seed: 42
model:
  backbone: hgnetv2_b0.ssld_stage2_ft_in1k
  fmax: null
  fmin: 20
  hop_length: 313
  in_chans: 1
  lms_shape:
  - 256
  - 256
  mixup_alpha: 1.0
  mixup_skip_epochs: 5
  mixup_theta: 0.8
  n_fft: 2048
  n_mels: 256
  power: 2.0
  top_db: 80.0
  win_length: 626
output:
  dir: outputs/hgnet-v2
training:
  backbone_lr_mult: 0.1
  batch_size: 64
  early_stopping_patience: 5
  epochs: 20
  learning_rate: 0.0001
  scheduler: cosine
  ss_oversample: 2
  ss_weight: 0.3
  use_llrd: true
  warmup_epochs: 1
  weight_decay: 0.0001
