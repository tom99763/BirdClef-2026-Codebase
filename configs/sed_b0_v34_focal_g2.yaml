experiment:
  name: sed-b0-v34-focal-g2
  seed: 42

# v34: Binary Focal Loss, gamma=2.0, alpha=0.75 (EDA-corrected)
#
# EDA findings (birdclef-2026/train.csv, 234 classes, 35549 samples):
#   - Median class neg:pos = 341:1  (104 samples out of 35549)
#   - Max imbalance: 0-sample classes → ~35548:1
#   - 53 classes with 0 samples, 25 with <10 samples
#   - Insecta (28 classes): median 0 samples — extreme tail
#
# Focal loss design rationale:
#   - gamma=2.0: standard for heavy imbalance (RetinaNet: gamma=2.0 at ~1:1000)
#     Our median 341:1 justifies this same setting.
#   - alpha=0.75 (NOT 0.25!): alpha=0.25 downweights positives, worsening imbalance
#     at 341:1 it creates a trivial-minimum (predict all-zero minimizes loss).
#     Flip to alpha=0.75 → positives weighted 3x higher than negatives.
#   - Dual loss (clip + frame) keeps spatial supervision.
#   - No warmup: LR starts at max (1e-3) and decays monotonically (large→small).

data:
  train_audio_dir: birdclef-2026/train_audio
  train_soundscapes_dir: birdclef-2026/train_soundscapes
  train_csv: birdclef-2026/train.csv
  taxonomy_csv: birdclef-2026/taxonomy.csv
  soundscapes_labels_csv: birdclef-2026/train_soundscapes_labels.csv
  sample_submission_csv: birdclef-2026/sample_submission.csv
  min_rating: 0.0
  use_secondary_labels: true
  secondary_label_weight: 1.0
  max_files: null
  noise_dir: null

audio:
  sample_rate: 32000
  clip_duration: 5
  n_clips_per_file: 3

mel:
  n_fft: 2048
  hop_length: 512
  n_mels: 224
  fmin: 0.0
  fmax: 16000.0

model:
  backbone: tf_efficientnet_b0.ns_jft_in1k
  pretrained: true
  dropout: 0.1
  in_chans: 3
  use_gem: true
  gem_p_init: 3.0
  use_gpu_mel: true

training:
  epochs: 50
  batch_size: 32
  optimizer: adamw
  learning_rate: 0.001
  weight_decay: 0.0001
  scheduler: cosine
  warmup_epochs: 0
  label_smoothing: 0.0
  mixup_alpha: 0.5
  loss: focal_bce             # FocalBCELossTorch
  focal_gamma: 2.0            # EDA: median neg:pos=341:1 → gamma=2.0 standard
  focal_alpha: 0.75           # EDA: corrected from 0.25 → pos needs 3x weight to avoid trivial min
  clip_loss_weight: 0.5
  frame_loss_weight: 0.5
  soundscape_only: false
  use_soundscapes_in_train: false
  soundscape_val_frac: 1.0
  soundscape_oversample: 1
  save_topk_checkpoints: 5
  early_stopping_patience: 20

augmentation:
  enabled: true
  noise_level: 0.005
  gain_range: [0.7, 1.3]
  time_masking: true
  time_mask_param: 30
  freq_masking: true
  freq_mask_param: 30

wandb:
  enabled: true
  entity: null
  project: birdclef-2026
  tags: [SED, v34, focal-bce, gamma2, alpha0.75, no-warmup]

output:
  dir: outputs
  checkpoint_dir: checkpoints
