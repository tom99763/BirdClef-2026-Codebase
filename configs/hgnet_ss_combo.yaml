data:
  audio_dir: birdclef-2026/train_audio
  n_folds: 5
  soundscape_dir: birdclef-2026/train_soundscapes
  soundscape_gt_csv: birdclef-2026/train_soundscapes_labels.csv
  soundscape_labels_csv: birdclef-2026/train_soundscapes_labels.csv
  taxonomy_csv: birdclef-2026/taxonomy.csv
  train_csv: birdclef-2026/train.csv
experiment:
  name: hgnet-ss-combo
  seed: 42
model:
  backbone: hgnetv2_b0.ssld_stage2_ft_in1k
  fmin: 20
  hop_length: 313
  in_chans: 1
  lms_shape:
  - 256
  - 256
  mixup_alpha: 1.0
  mixup_theta: 0.8
  n_fft: 2048
  n_mels: 256
  power: 2.0
  top_db: 80.0
  win_length: 626
output:
  dir: outputs/hgnet-ss-combo
training:
  asl_gamma_neg: 4.0
  asl_gamma_pos: 0.0
  asl_margin: 0.05
  batch_size: 64
  early_stopping_patience: 7
  epochs: 35
  freq_mask: 32
  gain_range:
  - 0.1
  - 1.0
  learning_rate: 0.0005
  loss_type: asl
  n_freq_masks: 1
  n_time_masks: 1
  ss_gt_oversample: 2
  ss_gt_weight: 0.3
  sumix_alpha: 0.5
  swa_lr: 1.0e-05
  swa_start_frac: 0.75
  time_mask: 32
  timewise_weight: 0.5
  use_cutmix: false
  use_gain_norm: true
  use_llrd: false
  use_specaug: true
  use_sumix_freq: true
  use_swa: true
  warmup_epochs: 3
  weight_decay: 0.0001
