# BirdClef 2026 — SED Extended Frequency Config
#
# Extended mel spectrogram to 20kHz (fmax) with 256 mel bins provides better
# frequency resolution for insects (high-freq calls) and cleaner representation
# for frogs (Amphibia). Uses taxon-upweight class weighting to additionally
# boost non-Aves species during training.

experiment:
  name: "sed-extended-freq"
  seed: 42

data:
  train_audio_dir: "birdclef-2026/train_audio"
  train_soundscapes_dir: "birdclef-2026/train_soundscapes"
  train_csv: "birdclef-2026/train.csv"
  taxonomy_csv: "birdclef-2026/taxonomy.csv"
  soundscapes_labels_csv: "birdclef-2026/train_soundscapes_labels.csv"
  sample_submission_csv: "birdclef-2026/sample_submission.csv"
  min_rating: 3.0
  use_secondary_labels: true
  max_files: null
  noise_dir: null

audio:
  sample_rate: 32000
  clip_duration: 5
  n_clips_per_file: 3

# ── Mel spectrogram parameters ────────────────────────────────────────────────
mel:
  n_fft: 2048        # higher frequency resolution
  hop_length: 320
  n_mels: 256        # more mel bins for better freq resolution
  fmin: 20.0
  fmax: 20000.0      # extended to cover insects (up from 16000)

# ── Model ─────────────────────────────────────────────────────────────────────
model:
  backbone: "tf_efficientnetv2_s_in21k"
  pretrained: true
  dropout: 0.3

# ── Training ──────────────────────────────────────────────────────────────────
training:
  epochs: 50
  batch_size: 32
  optimizer: "adamw"
  learning_rate: 1.0e-4
  weight_decay: 1.0e-4
  scheduler: "cosine"
  warmup_epochs: 3
  label_smoothing: 0.05
  mixup_alpha: 0.3
  focal_gamma: 2.0
  focal_alpha: 0.25
  class_weight_mode: "taxon_upweight"  # if supported by SED trainer

# ── Augmentation ──────────────────────────────────────────────────────────────
augmentation:
  enabled: true
  noise_level: 0.005
  gain_range: [0.7, 1.3]
  time_masking: true
  time_mask_ratio: 0.1
  time_mask_n: 2
  background_noise: false
  snr_db_range: [5.0, 30.0]

# ── WandB ─────────────────────────────────────────────────────────────────────
wandb:
  enabled: true
  project: "birdclef-2026"
  entity: null
  tags: ["SED", "extended-freq", "20kHz", "256-mels", "taxon-upweight"]
  log_model: false

output:
  dir: "outputs"
  checkpoint_dir: "checkpoints"
