run_name: embed-distill-b0-v5

# Phase 1: Improved B0 embedding distillation
# Changes vs v2 (best: 0.6283 cos):
#   - Double SpecAugment masks (2× freq, 2× time) → stronger augmentation
#   - mixup_alpha=0.4 → interpolate pairs of clips in embedding space
#   - noise_std=0.01 → mild Gaussian noise
#   - epochs=40 (more training since we're not labeling, no overfit risk)
#   - lr=0.0008 (slightly higher for faster convergence)
# Goal: push cosine similarity > 0.65 before SED head fine-tuning

data:
  manifest_path: outputs/embeddings_cache/manifest.csv
  train_audio_dir: birdclef-2026/train_audio
  soundscapes_dir: birdclef-2026/train_soundscapes
  mel_cache_dir: outputs/mel_cache

audio:
  sample_rate: 32000
  clip_seconds: 5

mel:
  n_fft: 2048
  hop_length: 512
  n_mels: 224
  fmin: 0.0
  fmax: 16000.0

model:
  backbone: tf_efficientnet_b0.ns_jft_in1k
  teacher_dim: 1536
  pretrained: true
  drop_rate: 0.1
  in_chans: 3

training:
  epochs: 40
  batch_size: 64
  learning_rate: 0.0008
  weight_decay: 0.0001
  warmup_epochs: 3
  early_stopping_patience: 7
  loss_fn: cosine

augmentation:
  enabled: true
  freq_mask_param: 40
  time_mask_param: 64
  n_freq_masks: 2
  n_time_masks: 2
  noise_std: 0.01
  mixup_alpha: 0.4
