# BirdClef 2026 — SED Debug Config (fast sanity check)
#
# 200 files, 3 epochs, no WandB.
# Usage:
#   python train_sed.py --config configs/sed_debug.yaml

experiment:
  name: "sed-debug"
  seed: 42

data:
  train_audio_dir: "birdclef-2026/train_audio"
  train_soundscapes_dir: "birdclef-2026/train_soundscapes"
  train_csv: "birdclef-2026/train.csv"
  taxonomy_csv: "birdclef-2026/taxonomy.csv"
  soundscapes_labels_csv: "birdclef-2026/train_soundscapes_labels.csv"
  sample_submission_csv: "birdclef-2026/sample_submission.csv"
  min_rating: 0.0
  use_secondary_labels: true
  max_files: 200
  noise_dir: null

audio:
  sample_rate: 32000
  clip_duration: 5
  n_clips_per_file: 1

mel:
  n_fft: 1024
  hop_length: 320
  n_mels: 128
  fmin: 20.0
  fmax: 16000.0

model:
  backbone: "tf_efficientnet_b0_ns"  # Lightweight for fast debug
  pretrained: false                  # Skip download in debug
  dropout: 0.3

training:
  epochs: 3
  batch_size: 8
  optimizer: "adam"
  learning_rate: 1.0e-4
  weight_decay: 1.0e-4
  scheduler: "none"
  warmup_epochs: 0
  label_smoothing: 0.05
  mixup_alpha: 0.0
  focal_gamma: 2.0
  focal_alpha: 0.25
  class_weight_mode: "none"

augmentation:
  enabled: false
  noise_level: 0.005
  gain_range: [0.7, 1.3]
  time_masking: false
  time_mask_ratio: 0.1
  time_mask_n: 2
  background_noise: false
  snr_db_range: [5.0, 30.0]

wandb:
  enabled: false
  project: "birdclef-2026"
  entity: null
  tags: ["SED", "debug"]
  log_model: false

output:
  dir: "outputs/debug"
  checkpoint_dir: "checkpoints/debug"
