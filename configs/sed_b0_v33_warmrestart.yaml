experiment:
  name: sed-b0-v33-warmrestart
  seed: 42

# v33: BCE dual, CosineWarmRestarts (T0=10), lr=1e-3
# Warm restarts allow LR to reset periodically to escape local minima.
# Each restart: LR jumps back to 1e-3, then cosine-decays to eta_min over T0 epochs.
# Schedule: ep1-10 (1e-3→1e-6), ep11-20 (restart→1e-6), ep21-30, ep31-40, ep41-50
# First restart cycle always from max; no warmup (starts at lr_max on ep1).

data:
  train_audio_dir: birdclef-2026/train_audio
  train_soundscapes_dir: birdclef-2026/train_soundscapes
  train_csv: birdclef-2026/train.csv
  taxonomy_csv: birdclef-2026/taxonomy.csv
  soundscapes_labels_csv: birdclef-2026/train_soundscapes_labels.csv
  sample_submission_csv: birdclef-2026/sample_submission.csv
  min_rating: 0.0
  use_secondary_labels: true
  secondary_label_weight: 1.0
  max_files: null
  noise_dir: null

audio:
  sample_rate: 32000
  clip_duration: 5
  n_clips_per_file: 3

mel:
  n_fft: 2048
  hop_length: 512
  n_mels: 224
  fmin: 0.0
  fmax: 16000.0

model:
  backbone: tf_efficientnet_b0.ns_jft_in1k
  pretrained: true
  dropout: 0.1
  in_chans: 3
  use_gem: true
  gem_p_init: 3.0
  use_gpu_mel: true

training:
  epochs: 50
  batch_size: 32
  optimizer: adamw
  learning_rate: 0.001
  weight_decay: 0.0001
  scheduler: warm_restarts
  scheduler_T0: 10          # restart every 10 epochs
  scheduler_T_mult: 1       # constant cycle length
  scheduler_eta_min: 0.000001
  label_smoothing: 0.0
  mixup_alpha: 0.5
  loss: bce
  clip_loss_weight: 0.5
  frame_loss_weight: 0.5
  soundscape_only: false
  use_soundscapes_in_train: false
  soundscape_val_frac: 1.0
  soundscape_oversample: 1
  save_topk_checkpoints: 5
  early_stopping_patience: 20

augmentation:
  enabled: true
  noise_level: 0.005
  gain_range: [0.7, 1.3]
  time_masking: true
  time_mask_param: 30
  freq_masking: true
  freq_mask_param: 30

wandb:
  enabled: true
  entity: null
  project: birdclef-2026
  tags: [SED, v33, bce, dual-loss, warm-restarts, T0-10]

output:
  dir: outputs
  checkpoint_dir: checkpoints
