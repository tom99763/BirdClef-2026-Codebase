experiment:
  name: hgnet-ss-strong-aug
  seed: 42

# ── HGNet SS-StrongAug: Maximum Augmentation Pressure ───────────────────────
# 以最強的 augmentation 組合測試模型上限：
#   mixup alpha=4.0（更強的插值，更少見到純樣本）
#   SumixFreq + SpecAugment（雙重頻率/時間干擾）
#   GainNorm（振幅隨機化）
#   CutMix（結構性遮罩混合）
# 假設：soundscape 錄音包含複雜背景，強 aug 迫使模型學習更 robust 的特徵。

data:
  train_csv:             birdclef-2026/train.csv
  soundscape_labels_csv: birdclef-2026/train_soundscapes_labels.csv
  taxonomy_csv:          birdclef-2026/taxonomy.csv
  audio_dir:             birdclef-2026/train_audio
  soundscape_dir:        birdclef-2026/train_soundscapes
  soundscape_gt_csv:     birdclef-2026/train_soundscapes_labels.csv
  n_folds:               5

model:
  backbone:     hgnetv2_b0.ssld_stage2_ft_in1k
  in_chans:     1
  n_mels:       256
  n_fft:        2048
  win_length:   626
  hop_length:   313
  fmin:         20
  top_db:       80.0
  power:        2.0
  lms_shape:    [256, 256]
  mixup_alpha:  4.0   # aggressive mixup
  mixup_theta:  0.9

training:
  epochs:                   35
  batch_size:               64
  learning_rate:            5.0e-4
  weight_decay:             1.0e-4
  use_llrd:                 false
  warmup_epochs:            3
  early_stopping_patience:  7
  loss_type:                custom_bce
  ss_gt_weight:             0.3
  ss_gt_oversample:         2
  use_sumix_freq:           true
  sumix_alpha:              0.5
  use_specaug:              true
  freq_mask:                64
  time_mask:                64
  n_freq_masks:             2
  n_time_masks:             2
  use_cutmix:               true
  cutmix_alpha:             1.0
  use_gain_norm:            true
  gain_range:               [0.05, 1.0]
  use_swa:                  false

output:
  dir: outputs/hgnet-ss-strong-aug
