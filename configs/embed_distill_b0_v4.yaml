run_name: embed-distill-b0-v4

# B0 + aggressive augmentation: double SpecAugment + Mixup + Gaussian noise
# Tests whether heavier augmentation forces more robust representations

data:
  manifest_path: outputs/embeddings_cache/manifest.csv
  train_audio_dir: birdclef-2026/train_audio
  soundscapes_dir: birdclef-2026/train_soundscapes
  mel_cache_dir: outputs/mel_cache

audio:
  sample_rate: 32000
  clip_seconds: 5

mel:
  n_fft: 2048
  hop_length: 512
  n_mels: 224
  fmin: 0.0
  fmax: 16000.0

model:
  backbone: tf_efficientnet_b0.ns_jft_in1k
  teacher_dim: 1536
  pretrained: true
  drop_rate: 0.1
  in_chans: 1

training:
  epochs: 30
  batch_size: 64
  learning_rate: 0.001
  weight_decay: 0.0001
  warmup_epochs: 2
  early_stopping_patience: 5
  loss_fn: cosine

augmentation:
  enabled: true
  freq_mask_param: 40    # wider freq masks
  time_mask_param: 64    # wider time masks (~20% of 313)
  n_freq_masks: 2        # apply twice
  n_time_masks: 2        # apply twice
  noise_std: 0.05        # light gaussian noise on mel
  mixup_alpha: 0.4       # beta(0.4,0.4) mixup between mel clips
