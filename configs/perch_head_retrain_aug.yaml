# BirdClef 2026 — Perch head retrain WITH augmentation
#
# Same as exp_nohuman_label_soundscape_train.yaml but with:
#   - augmentation.enabled: true (gaussian noise + random gain + time masking)
#   - name: perch-head-retrain-aug  (separate checkpoint dir)
#   - early_stop_patience: 10
#
# Purpose: produce a better teacher for the SED-NS chain.

experiment:
  name: "perch-head-retrain-aug"
  seed: 42

data:
  train_audio_dir: "birdclef-2026/train_audio"
  train_soundscapes_dir: "birdclef-2026/train_soundscapes"
  train_csv: "birdclef-2026/train.csv"
  taxonomy_csv: "birdclef-2026/taxonomy.csv"
  soundscapes_labels_csv: "birdclef-2026/train_soundscapes_labels.csv"
  sample_submission_csv: "birdclef-2026/sample_submission.csv"
  min_rating: 3.0
  use_secondary_labels: true
  max_files: null
  noise_dir: null
  pseudo_labels_csv: "pseudo_labels/round1_pseudo.csv"
  pseudo_manifest_csv: "outputs/embeddings_cache_nohuman_label/manifest.csv"

audio:
  sample_rate: 32000
  clip_duration: 5
  n_clips_per_file: 3

model:
  perch_dir: "models/bird-vocalization-classifier-tensorflow2-perch_v2-v2"
  mode: "label_head"
  hidden_dim: 256
  dropout: 0.3

training:
  epochs: 80
  batch_size: 256
  optimizer: "adam"
  learning_rate: 1.0e-3
  weight_decay: 1.0e-4
  scheduler: "cosine"
  warmup_epochs: 5
  label_smoothing: 0.05
  mixup_alpha: 0.3
  use_soundscapes_in_train: true
  soundscape_oversample: 5
  val_mode: "holdout"
  loss: "bce"
  focal_gamma: 2.0
  focal_alpha: 0.25
  class_weight_mode: "none"
  use_pseudo_labels: true

augmentation:
  enabled: true
  noise_level: 0.005
  gain_range: [0.7, 1.3]
  time_masking: true
  time_mask_ratio: 0.1
  time_mask_n: 2

cache:
  enabled: true
  cache_dir: "outputs/embeddings_cache_nohuman_label"

wandb:
  enabled: true
  project: "birdclef-2026"
  entity: null
  tags: ["perch-head", "retrain-aug", "ns-pipeline"]
  log_model: false

output:
  dir: "outputs"
  checkpoint_dir: "checkpoints"
