experiment:
  name: sed-ns-pvt-20s-r11
  seed: 42
  round: 11

# ── PVT v2 B0 Transformer Series ──────────────────────────────────────────────
data:
  train_csv:              birdclef-2026/train.csv
  soundscape_labels_csv:  birdclef-2026/train_soundscapes_labels.csv
  taxonomy_csv:           birdclef-2026/taxonomy.csv
  audio_dir:              birdclef-2026/train_audio
  soundscape_dir:         birdclef-2026/train_soundscapes
  pseudo_labels_csv:      pseudo_labels/sed_20s_pvt_r10.csv
  n_folds:                5

model:
  backbone:         pvt_v2_b0
  clip_duration:    20
  n_mels:           224
  n_fft:            2048
  hop_length:       512
  fmin:             0
  fmax:             16000
  top_db:           80.0
  power:            2.0
  norm:             slaney
  mel_scale:        htk
  peak_norm:        false
  dropout:          0.1
  drop_path_rate:   0.1
  gem_p_init:       3.0
  freq_mask:        24
  time_mask:        64

training:
  nc_distill_beta:    0.05
  nc_temperature:     2.0
  early_stopping_patience: 4
  epochs:             25
  batch_size:         16
  learning_rate:      5.0e-4
  weight_decay:       1.0e-4
  focal_gamma:        2.0
  mixup_alpha:        0.15
  pseudo_weight:      1.0
  pseudo_mixup_alpha: 0.15
  use_sumix_freq:     false
  ema_decay:          0.999
  prev_round_dir:     outputs/sed-ns-pvt-20s-r10

output:
  dir:          outputs/sed-ns-pvt-20s-r11
  infer_all_ss: false
