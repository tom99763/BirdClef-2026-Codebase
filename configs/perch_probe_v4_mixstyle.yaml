experiment:
  name: perch-probe-v4-mixstyle
  seed: 42

# DG Experiment: MixStyle on PCA Embeddings
# ------------------------------------------
# Motivation: The Perch probe MLP is trained on PCA-projected embeddings from
# two domains: train_audio (source, global focal) and train_soundscapes (target proxy).
# The MLP may overfit to domain-level statistical differences in the embedding space.
#
# Embedding MixStyle (adapted from Zhou et al., ICLR 2021):
# During each training step, for each sample i, randomly sample a partner j from
# the same batch. Mix their channel-wise mean and std:
#   μ_mix = λ*μ_i + (1-λ)*μ_j  where λ ~ Beta(0.1, 0.1)
#   σ_mix = λ*σ_i + (1-λ)*σ_j
#   z_mix = (z_i - μ_i) / σ_i * σ_mix + μ_mix
#
# Effect: synthesizes virtual domain shifts in PCA embedding space, forcing MLP
# to learn domain-invariant class boundaries.
#
# mixstyle_prob: 0.5 (apply to 50% of samples per batch)
# mixstyle_alpha: 0.1 (Beta mixing — sharp domain interpolation)
#
# Base: v3-addtrain-only (OOF 0.8119). Only change: +MixStyle during MLP training.
# Expected: +1-2pp OOF AUC

data:
  base_dir: birdclef-2026
  manifest_path: outputs/embeddings_cache_nohuman/manifest.csv
  pca_fit_splits: [train, soundscape]
  add_train_clips: true

model:
  pca_dim: 128
  hidden_dim: 512
  use_hidden: true
  dropout: 0.3
  pca_whiten: true
  abt_n_top: 0
  use_proto: false
  use_tip: false
  use_fecam: false
  use_laplacian: false
  use_gamma: false
  blend_mlp: 1.0
  # DG: MixStyle on embeddings
  mixstyle: true
  mixstyle_prob: 0.5
  mixstyle_alpha: 0.1

training:
  epochs: 150
  batch_size: 256
  n_folds: 5
  learning_rate: 0.001
  weight_decay: 0.0001
  patience: 25
  asl_gamma_neg: 4.0
  asl_gamma_pos: 0.0
  asl_clip: 0.05

output:
  dir: outputs

wandb:
  enabled: true
  project: birdclef-2026
  tags: [perch-probe, v4, domain-generalization, mixstyle, pca128, add-train]
