experiment:
  name: proto-ssm-v3
  seed: 42

data:
  labeled_npz:     outputs/perch_labeled_ss.npz
  labels_csv:      birdclef-2026/train_soundscapes_labels.csv
  taxonomy_csv:    birdclef-2026/taxonomy.csv
  n_folds:         5
  windows_per_seq: 12

teacher_temperature: 1.0

model:
  n_classes:    234
  d_input:      1536
  d_model:      128
  d_state:      16
  n_ssm_layers: 2
  n_windows:    12
  dropout:      0.15

training:
  epochs:                  100
  learning_rate:           0.002
  weight_decay:            0.001
  early_stopping_patience: 0     # disabled
  pos_weight_cap:          30.0
  loss_distill_weight:     0.3
  loss_family_weight:      0.1
  grad_clip:               1.0
  init_prototypes:         true
  batch_size:              0     # 0 = full batch

output:
  dir:        outputs/proto-ssm-v3
  save_oof:   true
  save_model: true
