experiment:
  name: "birdclef25-soundscape"
  seed: 42

data:
  train_audio_dir: "birdclef-2026/train_audio"
  train_soundscapes_dir: "birdclef-2026/train_soundscapes"
  train_csv: "birdclef-2026/train.csv"
  taxonomy_csv: "birdclef-2026/taxonomy.csv"
  soundscapes_labels_csv: "birdclef-2026/train_soundscapes_labels.csv"
  sample_submission_csv: "birdclef-2026/sample_submission.csv"
  min_rating: 3.0           # From birdclef25-base: cleaner data
  use_secondary_labels: true
  max_files: null
  noise_dir: null

audio:
  sample_rate: 32000
  clip_duration: 5
  n_clips_per_file: 3

model:
  perch_dir: "models/bird-vocalization-classifier-tensorflow2-perch_v2-v2"
  mode: "embedding_head"
  hidden_dim: 512
  dropout: 0.3

training:
  epochs: 50
  batch_size: 256
  optimizer: "adam"
  learning_rate: 1.0e-3
  weight_decay: 1.0e-4
  scheduler: "cosine"
  warmup_epochs: 3
  label_smoothing: 0.05
  mixup_alpha: 0.3
  use_soundscapes_in_train: true    # From soundscape-in-train
  loss: "bce"
  focal_gamma: 2.0
  focal_alpha: 0.25
  class_weight_mode: "none"

augmentation:
  enabled: true
  noise_level: 0.005
  gain_range: [0.7, 1.3]
  time_masking: false
  time_mask_ratio: 0.1
  time_mask_n: 2
  background_noise: false
  snr_db_range: [5.0, 30.0]

cache:
  enabled: true
  cache_dir: "outputs/embeddings_cache"

wandb:
  enabled: true
  project: "birdclef-2026"
  entity: null
  tags: ["birdclef25-soundscape", "min-rating", "domain-adaptation"]
  log_model: false

output:
  dir: "outputs"
  checkpoint_dir: "checkpoints"
