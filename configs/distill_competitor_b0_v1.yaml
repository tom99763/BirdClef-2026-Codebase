experiment:
  name: distill-competitor-b0-v1
  seed: 42

# ── Competitor SED Knowledge Distillation ────────────────────────────────────
#
# Teacher : competitor_sed_fold0.pt  (EfficientNet-B0, ss-val AUC=0.9478)
# Student : EfficientNet-B0 (fresh init from ImageNet pretrain)
#
# For each train_audio clip we have:
#   - Hard label:  train.csv primary/secondary labels (ground truth)
#   - Soft label:  competitor SED file-level mean prediction (teacher signal)
#
# Loss = FocalBCE(student_logit, hard_label)
#       + kd_weight * BCE(student_prob, competitor_soft_label)
#
# Augmentation: SumixFreq + SpecAug (freq+time masking) + MixUp on audio
# Validation:   GroupKFold on 66 labeled soundscapes → soundscape-level AUC

data:
  train_csv:             birdclef-2026/train.csv
  soundscape_labels_csv: birdclef-2026/train_soundscapes_labels.csv
  taxonomy_csv:          birdclef-2026/taxonomy.csv
  audio_dir:             birdclef-2026/train_audio
  soundscape_dir:        birdclef-2026/train_soundscapes
  competitor_pseudo_npz: outputs/competitor_pseudo/train_audio_probs.npz
  n_folds:               5

model:
  backbone:       tf_efficientnet_b0.ns_jft_in1k
  clip_duration:  5          # match competitor (5s clips)
  n_mels:         224
  n_fft:          2048
  hop_length:     512
  fmin:           0
  fmax:           16000
  top_db:         80.0
  power:          2.0
  norm:           slaney
  mel_scale:      htk
  peak_norm:      false
  dropout:        0.1
  drop_path_rate: 0.15
  gem_p_init:     3.0
  freq_mask:      24
  time_mask:      32

training:
  early_stopping_patience: 5
  epochs:          30
  batch_size:      128
  learning_rate:   1.0e-3
  weight_decay:    1.0e-4
  focal_gamma:     2.0
  mixup_alpha:     0.15          # MixUp lambda (fixed 0.5 per 1st place)
  use_sumix_freq:  true          # SumixFreq (1st place)
  kd_weight:       0.5           # competitor KD loss weight

output:
  dir: outputs/distill-competitor-b0-v1
