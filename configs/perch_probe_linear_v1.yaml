experiment:
  name: perch-probe-linear-v1
  seed: 42

# Linear probe baseline — no hidden layer, PCA(128) → Linear → 234
# Closest to the existing LogReg approach but trained with ASL gradient descent

data:
  base_dir: birdclef-2026
  manifest_path: outputs/embeddings_cache_nohuman/manifest.csv
  pca_fit_splits: [train, soundscape]
  add_train_clips: false

model:
  pca_dim: 128
  hidden_dim: 0
  use_hidden: false
  dropout: 0.0
  pca_whiten: true

training:
  epochs: 200
  batch_size: 64
  n_folds: 5
  learning_rate: 0.001
  weight_decay: 0.001
  patience: 30
  asl_gamma_neg: 4.0
  asl_gamma_pos: 0.0
  asl_clip: 0.05

output:
  dir: outputs

wandb:
  enabled: true
  project: birdclef-2026
  tags: [perch-probe, linear, pca128, asl]
