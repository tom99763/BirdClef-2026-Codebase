experiment:
  name: perch-probe-v4-groupdro
  seed: 42

# DG Experiment: Group DRO by Soundscape Site
# --------------------------------------------
# Motivation: The 9 ARU deployment sites in train_soundscapes have different
# acoustic conditions — vegetation density, proximity to water, seasonal timing.
# A probe that minimizes average OOF loss may perform well on easy sites but
# poorly on hard ones. The test soundscapes include all sites.
#
# GroupDRO (Sagawa et al., ICLR 2020):
# Instead of minimizing E[loss], minimize max_{g in sites} E[loss | group=g].
# This forces the probe to be robust to the hardest deployment site.
#
# Implementation:
# - Parse site ID from source_file (e.g. BC2026_Train_0039_S22_... → S22)
# - Use site as group label in GroupDRO training objective
# - groupdro_eta: step size for dual variable updates (0.01)
# - groupdro_alpha: upweighting factor for worst group (1.0)
#
# Base: v3-addtrain-only (OOF 0.8119). Change: GroupDRO loss instead of ERM.
# Expected: more consistent per-site OOF, potentially +1-2pp on hard sites

data:
  base_dir: birdclef-2026
  manifest_path: outputs/embeddings_cache_nohuman/manifest.csv
  pca_fit_splits: [train, soundscape]
  add_train_clips: true

model:
  pca_dim: 128
  hidden_dim: 512
  use_hidden: true
  dropout: 0.3
  pca_whiten: true
  abt_n_top: 0
  use_proto: false
  use_tip: false
  use_fecam: false
  use_laplacian: false
  use_gamma: false
  blend_mlp: 1.0

training:
  epochs: 150
  batch_size: 256
  n_folds: 5
  learning_rate: 0.001
  weight_decay: 0.0001
  patience: 25
  asl_gamma_neg: 4.0
  asl_gamma_pos: 0.0
  asl_clip: 0.05
  # DG: Group DRO by soundscape site
  use_groupdro: true
  groupdro_eta: 0.01          # dual variable step size
  groupdro_group_column: site  # parse from source_file (e.g. S22 → group 22)

output:
  dir: outputs

wandb:
  enabled: true
  project: birdclef-2026
  tags: [perch-probe, v4, domain-generalization, groupdro, site-robust, pca128, add-train]
