experiment:
  name: "perch-embedding-head-v1"
  seed: 42

data:
  train_audio_dir: "birdclef-2026/train_audio"
  train_soundscapes_dir: "birdclef-2026/train_soundscapes"
  train_csv: "birdclef-2026/train.csv"
  taxonomy_csv: "birdclef-2026/taxonomy.csv"
  soundscapes_labels_csv: "birdclef-2026/train_soundscapes_labels.csv"
  sample_submission_csv: "birdclef-2026/sample_submission.csv"
  min_rating: 0.0          # Filter recordings below this rating (0 = keep all)
  use_secondary_labels: true
  max_files: null           # null = use all files

audio:
  sample_rate: 32000
  clip_duration: 5          # seconds
  n_clips_per_file: 3       # random clips extracted per recording during training

model:
  perch_dir: "models/bird-vocalization-classifier-tensorflow2-perch_v2-v2"
  mode: "embedding_head"    # "embedding_head" (frozen backbone) or "full_finetune"
  hidden_dim: 512
  dropout: 0.3

training:
  epochs: 50
  batch_size: 64
  optimizer: "adam"         # "adam" or "adamw"
  learning_rate: 1.0e-3
  weight_decay: 1.0e-4      # used only with adamw
  scheduler: "cosine"       # "cosine" or "none"
  warmup_epochs: 3
  label_smoothing: 0.05
  mixup_alpha: 0.3          # 0 = disable mixup
  use_soundscapes_in_train: false  # also use soundscape segments for training

augmentation:
  enabled: true
  noise_level: 0.005
  gain_range: [0.7, 1.3]

cache:
  enabled: true
  cache_dir: "outputs/embeddings_cache"

wandb:
  enabled: true
  project: "birdclef-2026"
  entity: null              # set to your WandB username/org
  tags: ["perch", "embedding-head", "birdclef-2026"]
  log_model: false

output:
  dir: "outputs"
  checkpoint_dir: "checkpoints"
