experiment:
  name: distill-competitor-b0-v3
  seed: 42

# ── Competitor KD v3 — Feature-level KD + output KD (deep supervision) ────────
#
# Changes vs v1:
#   - Temperature scaling on KD: T=4.0 (softer teacher distribution)
#   - Longer training: 40 epochs
#   - Lower LR + cosine warmup (3 epochs)
#   - LLRD backbone: backbone lr = 0.1× head lr
#   - drop_path_rate: 0.15 → 0.10 (less drop = more capacity)

data:
  train_csv:             birdclef-2026/train.csv
  soundscape_labels_csv: birdclef-2026/train_soundscapes_labels.csv
  taxonomy_csv:          birdclef-2026/taxonomy.csv
  audio_dir:             birdclef-2026/train_audio
  soundscape_dir:        birdclef-2026/train_soundscapes
  competitor_pseudo_npz: outputs/competitor_pseudo/train_audio_probs.npz
  n_folds:               5

model:
  backbone:       tf_efficientnet_b0.ns_jft_in1k
  clip_duration:  5
  n_mels:         224
  n_fft:          2048
  hop_length:     512
  fmin:           0
  fmax:           16000
  top_db:         80.0
  power:          2.0
  norm:           slaney
  mel_scale:      htk
  peak_norm:      false
  dropout:        0.1
  drop_path_rate: 0.10
  gem_p_init:     3.0
  freq_mask:      24
  time_mask:      32

training:
  early_stopping_patience: 7
  epochs:          40
  batch_size:      128
  learning_rate:   5.0e-4
  weight_decay:    1.0e-4
  focal_gamma:     2.0
  mixup_alpha:     0.15
  use_sumix_freq:  true
  kd_weight:       0.5
  kd_temperature:  4.0      # softens teacher: divide logits by T before sigmoid
  warmup_epochs:   3
  use_llrd:        true
  backbone_lr_mult: 0.1

output:
  dir: outputs/distill-competitor-b0-v3
