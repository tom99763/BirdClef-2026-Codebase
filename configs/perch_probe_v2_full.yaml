experiment:
  name: perch-probe-v2-full
  seed: 42

# (D+E+F) Full kitchen sink:
#   D: add 85k train_audio clips to MLP training
#   E: Tip-Adapter cache retrieval (soundscape only as keys)
#   F: Prototype + per-class gamma blend
#
# Key design: train clips boost MLP generalization,
# but proto/tip keys remain soundscape-only (high-quality multi-hot labels).

data:
  base_dir: birdclef-2026
  manifest_path: outputs/embeddings_cache_nohuman/manifest.csv
  pca_fit_splits: [train, soundscape]
  add_train_clips: true     # (D) 85k extra clips for MLP

model:
  pca_dim: 128
  hidden_dim: 256
  use_hidden: true
  dropout: 0.3
  pca_whiten: true
  use_proto: true           # (F)
  use_tip: true             # (E)
  use_gamma: true           # (F) per-class blend weight
  tip_temperature: 10.0

  blend_mlp: 0.5
  blend_proto: 0.25
  blend_tip: 0.25

training:
  epochs: 150
  batch_size: 256           # larger batch for 85k train set
  n_folds: 5
  learning_rate: 0.001
  weight_decay: 0.0001
  patience: 25
  asl_gamma_neg: 4.0
  asl_gamma_pos: 0.0
  asl_clip: 0.05

output:
  dir: outputs

wandb:
  enabled: true
  project: birdclef-2026
  tags: [perch-probe, v2, full, add-train, prototype, tip-adapter, gamma, pca128]
