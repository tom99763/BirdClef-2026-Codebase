data:
  audio_dir: birdclef-2026/train_audio
  n_folds: 5
  soundscape_dir: birdclef-2026/train_soundscapes
  soundscape_gt_csv: birdclef-2026/train_soundscapes_labels.csv
  soundscape_labels_csv: birdclef-2026/train_soundscapes_labels.csv
  taxonomy_csv: birdclef-2026/taxonomy.csv
  train_csv: birdclef-2026/train.csv
experiment:
  name: hgnet-ss-swa
  seed: 42
model:
  backbone: hgnetv2_b0.ssld_stage2_ft_in1k
  fmin: 20
  hop_length: 313
  in_chans: 1
  lms_shape:
  - 256
  - 256
  mixup_alpha: 1.0
  mixup_theta: 0.8
  n_fft: 2048
  n_mels: 256
  power: 2.0
  top_db: 80.0
  win_length: 626
output:
  dir: outputs/hgnet-ss-swa
training:
  batch_size: 64
  early_stopping_patience: 7
  epochs: 30
  label_smoothing: 0.05
  learning_rate: 0.0005
  loss_type: label_smooth
  ss_gt_oversample: 2
  ss_gt_weight: 0.3
  swa_lr: 1.0e-05
  swa_start_frac: 0.75
  timewise_weight: 0.5
  use_cutmix: false
  use_gain_norm: false
  use_llrd: false
  use_specaug: false
  use_sumix_freq: false
  use_swa: true
  warmup_epochs: 2
  weight_decay: 0.0001
