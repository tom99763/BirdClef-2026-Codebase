experiment:
  name: finetune-comp-v4
  seed: 42

# ── Fine-tune Competitor SED v4 — Noisy Student Round 2 + higher LR ─────────
#
# Init     : best fold from v3
# Changes  : slightly higher LR, higher dropout for more regularization
#            longer training with more patience
#
# Goal: Another noisy student iteration to squeeze more AUC

data:
  train_csv:             birdclef-2026/train.csv
  soundscape_labels_csv: birdclef-2026/train_soundscapes_labels.csv
  taxonomy_csv:          birdclef-2026/taxonomy.csv
  audio_dir:             birdclef-2026/train_audio
  soundscape_dir:        birdclef-2026/train_soundscapes
  competitor_ckpt:       "PLACEHOLDER_UPDATED_BY_PIPELINE"
  perch_ss_csv:          pseudo_labels/round5_pseudo.csv   # will be updated by pipeline
  n_folds:               5

model:
  backbone:       tf_efficientnet_b0.ns_jft_in1k
  clip_duration:  5
  n_mels:         224
  n_fft:          2048
  hop_length:     512
  fmin:           0
  fmax:           16000
  top_db:         80.0
  power:          2.0
  norm:           slaney
  mel_scale:      htk
  dropout:        0.1
  drop_path_rate: 0.05
  gem_p_init:     3.0
  freq_mask:      24
  time_mask:      32

training:
  early_stopping_patience: 6
  epochs:           25
  batch_size:       64
  learning_rate:    2.0e-5      # back to v1/v2 LR for noisy student divergence
  weight_decay:     1.0e-4
  focal_gamma:      2.0
  use_sumix_freq:   true
  ss_weight:        0.5         # higher pseudo label weight
  ss_oversample:    2
  use_llrd:         true
  backbone_lr_mult: 0.1
  warmup_epochs:    2

output:
  dir: outputs/finetune-comp-v4
